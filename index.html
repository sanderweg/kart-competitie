<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kart Competitie Firebase</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="hero">
      <p class="eyebrow">Kart Competitie</p>
      <h1>🏁 Racebeheer & Live Leaderboard</h1>
      <p class="sub">Firebase gekoppeld</p>
      <div id="connectionStatus" class="status">🟡 Verbinden...</div>
    </header>

    <main class="grid">
      <section class="card">
        <h2>Nieuwe race</h2>

        <div class="field">
          <label>Race naam</label>
          <input id="raceName" type="text">
        </div>

        <div class="field">
          <label>Datum</label>
          <input id="raceDate" type="date">
        </div>

        <div class="section-row">
          <h3>Sprint 1</h3>
          <button id="addSprint1DriverBtn" class="secondary">+ Driver</button>
        </div>
        <div id="sprint1DriversList" class="drivers-list"></div>

        <div class="section-row">
          <h3>Sprint 2</h3>
          <button id="addSprint2DriverBtn" class="secondary">+ Driver</button>
        </div>
        <div id="sprint2DriversList" class="drivers-list"></div>

        <div class="actions">
          <button id="saveRaceBtn">Race opslaan</button>
        </div>

        <p id="message"></p>
      </section>

      <section class="card full">
        <div class="section-row">
          <h2>Race geschiedenis</h2>
          <button id="exportBtn" class="secondary">Export JSON</button>
        </div>
        <div id="historyList"></div>
      </section>
    </main>
  </div>

  <script type="module" src="config.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
