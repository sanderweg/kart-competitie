<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kart Competitie</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="hero">
      <p class="eyebrow">Kart Competitie</p>
      <h1>🏁 Racebeheer & Leaderboard</h1>
      <p class="sub">Voer per driver een positie in. De punten worden automatisch berekend.</p>
    </header>

    <main class="grid">
      <section class="card">
        <h2>Nieuwe race</h2>
        <div class="field">
          <label for="raceName">Race naam</label>
          <input id="raceName" type="text" placeholder="Bijv. Clubrace 1">
        </div>
        <div class="field">
          <label for="raceDate">Datum</label>
          <input id="raceDate" type="date">
        </div>

        <div class="section-row">
          <h3>Drivers</h3>
          <button id="addDriverBtn" class="secondary" type="button">+ Driver toevoegen</button>
        </div>

        <div id="driversList" class="drivers-list"></div>

        <div class="actions">
          <button id="saveRaceBtn" type="button">Race opslaan</button>
          <button id="resetFormBtn" class="secondary" type="button">Leegmaken</button>
        </div>

        <p id="message" class="message"></p>
      </section>

      <section class="card">
        <div class="section-row">
          <h2>🏆 Leaderboard</h2>
          <button id="clearAllBtn" class="danger" type="button">Alles wissen</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Driver</th>
                <th>Race</th>
                <th>Positie</th>
                <th>Punten</th>
              </tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
          </table>
        </div>
      </section>

      <section class="card full">
        <div class="section-row">
          <h2>📜 Race geschiedenis</h2>
          <div class="inline-actions">
            <button id="exportBtn" class="secondary" type="button">Export JSON</button>
            <label class="file-label">Import JSON
              <input id="importInput" type="file" accept="application/json">
            </label>
          </div>
        </div>
        <div id="historyList" class="history-list"></div>
      </section>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
